services:

  # PostgreSQL
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-network

  # Interface web PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:9.13
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PG_WEB_MAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PG_WEB_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8082:80"
    volumes:
      - ./pgadmin-config/servers.json:/pgadmin4/servers.json
      - ./pgadmin-config/pgpassfile:/tmp/pgpassfile
    depends_on:
      - postgres
    networks:
      - db-network

  # Pipeline ETL — cron toutes les 5 min + reset quotidien à 1h01
  cron:
    build:
      context: .
      dockerfile: docker/Dockerfile.cron
    container_name: rerb-cron
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./documents:/app/documents
      - ./logs:/app/logs
      - ./.env:/app/.env
    networks:
      - db-network

  # Interface Streamlit
  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: rerb-streamlit
    restart: unless-stopped
    depends_on:
      - api
    environment:
      RERB_API_KEY: ${RERB_API_KEY}
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src
    networks:
      - db-network

  # API FastAPI
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: rerb-api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PG_HOST: postgres
      PYTHONPATH: /app/src
      RERB_API_KEY: ${RERB_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./.env:/app/.env
    networks:
      - db-network

  # Collecte de métriques — scrape l'API toutes les 60s
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    networks:
      - db-network

  # Tableau de bord — consulte Prometheus
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - db-network

  # Métriques système des conteneurs (CPU, RAM) pour Grafana
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - db-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  db-network:
    driver: bridge
